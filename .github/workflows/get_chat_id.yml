name: Detecter ID canal Telegram

on:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnostic bot / canal
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CANAL: "-1002074635129"
        run: |
          BOT_ID=$(curl -s "https://api.telegram.org/bot$TELEGRAM_TOKEN/getMe" | python3 -c "import sys,json;print(json.load(sys.stdin)['result']['id'])")
          echo "Bot id: $BOT_ID"
          echo "--- Statut du bot dans le canal ---"
          curl -s "https://api.telegram.org/bot$TELEGRAM_TOKEN/getChatMember?chat_id=$CANAL&user_id=$BOT_ID" | python3 -m json.tool
          echo "--- Infos canal ---"
          curl -s "https://api.telegram.org/bot$TELEGRAM_TOKEN/getChat?chat_id=$CANAL" | python3 -c "import sys,json;d=json.load(sys.stdin);print(json.dumps({k:d.get('result',{}).get(k) for k in ('id','title','type')}, ensure_ascii=False) if d.get('ok') else d)"

name: Macro USD -> Telegram

# Brief macro du matin (lun-ven) : les grosses news US qui bougent le NASDAQ.
# 07:00 UTC = 09:00 Paris en ete / 08:00 Paris en hiver (le matin dans tous les cas).
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  macro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install requests tzdata

      - name: Envoyer le brief macro
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python macro_news.py

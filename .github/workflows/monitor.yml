name: Suivi trade OPR -> Telegram

# Surveille le trade du jour (BE / TP / SL) toutes les 10 min pendant la seance.
# 13:00-20:59 UTC couvre 15h45-21h Paris (ete comme hiver).
on:
  schedule:
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: opr-state
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Surveiller le trade
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPR_SYMBOL: "^NDX"
          OPR_ASSET: "nas"
        run: python trade_monitor.py

      - name: Memoriser l'avancement du trade
        if: always()
        run: |
          git config user.name  "opr-bot"
          git config user.email "opr-bot@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add trade_today.json .opr_state 2>/dev/null || true
          git commit -m "etat: avancement trade" || echo "rien a committer"
          git push || echo "rien a pousser"

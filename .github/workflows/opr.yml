name: OPR Nasdaq -> Telegram

# Se reveille tout seul apres l'ouverture US (09:45 New York).
# Plusieurs reveils repartis pour couvrir l'heure d'ete ET d'hiver US, et
# rattraper un eventuel petit retard de GitHub. Le script a un garde-fou
# (n'agit qu'entre 09:45 et 11:30 New York) + un anti-doublon (1 seul message).
#   ETE  (EDT) : 09:45 NY = 13:45 UTC ... 11:30 NY = 15:30 UTC
#   HIVER(EST) : 09:45 NY = 14:45 UTC ... 11:30 NY = 16:30 UTC
on:
  schedule:
    - cron: "45 13 * * 1-5"
    - cron: "5 14 * * 1-5"
    - cron: "25 14 * * 1-5"
    - cron: "50 14 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "15 16 * * 1-5"
  workflow_dispatch:        # declencheur externe (cron-job.org) OU bouton manuel
    inputs:
      test:
        description: "Envoyer un message de TEST (donnees fictives)"
        type: boolean
        default: false          # declenchement externe = VRAI run ; cocher pour tester

permissions:
  contents: write           # pour memoriser la session deja envoyee (anti-doublon)

jobs:
  opr:
    runs-on: ubuntu-latest
    concurrency:
      group: opr-state
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer le robot OPR
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPR_SYMBOL: "^NDX"
          OPR_ASSET: "nas"
          OPR_DIAG: "1"   # TEMPORAIRE : mesure le retard des donnees et l'envoie sur Telegram
          # en run manuel avec la case cochee -> message de test ; sinon vide
          OPR_TEST: ${{ (github.event_name == 'workflow_dispatch' && inputs.test) && '1' || '' }}
        run: python opr_live.py

      - name: Memoriser la session envoyee
        if: always()
        run: |
          git config user.name  "opr-bot"
          git config user.email "opr-bot@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add .opr_state trade_today.json 2>/dev/null || true
          git commit -m "etat: session envoyee" || echo "rien a committer"
          git push || echo "rien a pousser"
